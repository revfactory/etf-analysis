title: 코스닥 ETF 포트폴리오 리포트
description: 코스닥 ETF 상위 3개(KODEX·TIGER·RISE)의 피투자사 구성과 시계열 비중 변화 분석
theme: null
plugins: []

# _workspace, .claude 등 언더스코어/도트 접두 디렉토리를 Jekyll이 기본 제외하지 않도록 include 지정
include:
  - _workspace

# 대용량/불필요 자산 제외
exclude:
  - _workspace/pdf_build/node_modules
  - .DS_Store
  - "**/.DS_Store"
  - CLAUDE.md
  - .claude

# 정적 파일로 취급 (마크다운 변환 방지)
keep_files:
  - _workspace
